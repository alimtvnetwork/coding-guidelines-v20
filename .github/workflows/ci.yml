name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

jobs:
  lint:
    name: Linter Scripts Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Cache Go build and module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.22-${{ hashFiles('linter-scripts/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-1.22-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('linter-scripts/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Verify linter scripts present
        run: |
          test -f linter-scripts/validate-guidelines.go             || { echo "::error::validate-guidelines.go missing"; exit 1; }
          test -f linter-scripts/validate-guidelines.py             || { echo "::error::validate-guidelines.py missing"; exit 1; }
          test -f linter-scripts/check-axios-version.sh             || { echo "::error::check-axios-version.sh missing"; exit 1; }
          test -f linter-scripts/check-spec-folder-refs.py          || { echo "::error::check-spec-folder-refs.py missing"; exit 1; }
          test -f linter-scripts/check-forbidden-spec-paths.sh      || { echo "::error::check-forbidden-spec-paths.sh missing"; exit 1; }
          test -f linter-scripts/check-forbidden-strings.py         || { echo "::error::check-forbidden-strings.py missing"; exit 1; }
          test -f linter-scripts/check-readme-install-section.py    || { echo "::error::check-readme-install-section.py missing"; exit 1; }
          test -f linter-scripts/forbidden-strings.toml             || { echo "::error::forbidden-strings.toml missing"; exit 1; }

      - name: Run Go validator (spec)
        run: go run linter-scripts/validate-guidelines.go --path spec --max-lines 15

      - name: Run Python validator (spec)
        run: python3 linter-scripts/validate-guidelines.py spec || true

      - name: Run Axios version check
        run: bash linter-scripts/check-axios-version.sh

      - name: Check spec folder references (stale-link guard)
        run: python3 linter-scripts/check-spec-folder-refs.py

      - name: Check forbidden spec paths (re-split + merge-proposal guard)
        run: bash linter-scripts/check-forbidden-spec-paths.sh

      - name: Check forbidden strings (TOML-driven rename guards)
        run: python3 linter-scripts/check-forbidden-strings.py

      - name: Forbidden-strings summary report (on failure)
        # Emits a per-rule digest with the EXACT `sed` command that
        # rewrites every stale match to its canonical replacement.
        # Auto-appends to $GITHUB_STEP_SUMMARY so reviewers see it
        # inline on the PR without opening logs.
        if: failure()
        run: python3 linter-scripts/forbidden-strings-summary.py --markdown

      - name: Check README install section (position + one-line fences)
        # Enforces:
        #   1. "Install in One Line" is the FIRST H2 after the platform badges.
        #   2. Every install/bundle code fence (powershell|bash|sh|pwsh) holds
        #      exactly one bare command — no `#` comments, no blank lines,
        #      no `\` line continuations.
        # Spec: .lovable/memory/constraints/install-command-formatting.md
        run: python3 linter-scripts/check-readme-install-section.py

      - name: Guard release-install.* against /releases/latest calls
        # Static guard: release-install.sh and release-install.ps1 MUST NOT
        # invoke api.github.com or releases/latest. Per
        # spec/14-update/25-release-pinned-installer.md they always run in
        # PINNED MODE and resolve the version from CLI / env / baked-in
        # placeholder only.
        run: bash tests/installer/check-no-latest-api.sh

      - name: release-install.sh exit-code acceptance (spec §F + §AC)
        # Verifies failure modes 1 (no version) and 2 (invalid semver)
        # AND the ratified $INSTALLER_VERSION env-var precedence-2 path.
        # Spec: spec/14-update/25-release-pinned-installer.md §B.2 + §F
        run: bash tests/installer/check-release-install-acceptance.sh

      - name: release.sh bake-output integration (spec §Release-Time Build Step)
        # Runs ./release.sh end-to-end and asserts the baked
        # release-install.{sh,ps1} have no placeholder, carry the
        # resolved tag, and are listed in checksums.txt.
        # Spec: spec/14-update/25-release-pinned-installer.md
        run: bash tests/installer/check-release-bake.sh

      - name: Bundle installer conformance (14 files, spec §3/§7/§8)
        # For every bundle in bundles.json, asserts the .sh/.ps1 pair
        # exists at repo root, parses, has --version/--no-discovery/
        # --no-main-fallback/--use-local-archive/-h/--help (PS1: -Help
        # bridge) plus EXIT CODES doc and the §7 mode banner, and that
        # no line invokes a network client against /releases/latest.
        # Spec: spec/14-update/27-generic-installer-behavior.md
        run: bash tests/installer/check-bundle-installers.sh

      - name: Root installer §27 conformance (install.sh / install.ps1 / linters-cicd)
        # Asserts root + linters-cicd installers expose --no-discovery,
        # --no-main-fallback, --offline (--use-local-archive), the §7
        # banner with mode:/source: lines, and the §8 EXIT CODES header.
        # Spec: spec/14-update/27-generic-installer-behavior.md
        run: bash tests/installer/check-root-install-acceptance.sh

      - name: BOOL-NEG-001 unit tests (linters-cicd)
        # Stdlib unittest suite that locks in the BOOL-NEG-001 v1
        # contract verified end-to-end through run-all.sh in v4.11.0
        # (closes pending-issue #01). Covers forbidden Is/Has + Not/No
        # combinations, the 10-name allow-list, positive forms, v1
        # out-of-scope boundary (Cannot/Disabled/Un-/In-/Dis- — task
        # #07 territory), and structural edge cases (multiple tables,
        # comments, empty input).
        run: python3 linters-cicd/tests/run.py

      - name: Verify codegen determinism (Rule 9 inverted-fields)
        # Re-runs the inverted-field codegen on committed fixtures and
        # diffs against expected/. Backs up the round-trip + bijection
        # guarantees proven in test_codegen_inversion_table.py (#04).
        # On drift: regen + commit (see script header).
        run: bash linters-cicd/codegen/scripts/verify-codegen-determinism.sh

  cross-links:
    name: Spec Cross-Reference Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify checker present
        run: |
          test -f linter-scripts/check-spec-cross-links.py \
            || { echo "::error::check-spec-cross-links.py missing"; exit 1; }

      - name: Validate spec internal cross-references
        # Walks spec/, parses every markdown link, fails on any broken link
        # or missing heading anchor. Waivers live in
        # linter-scripts/spec-cross-links.allowlist (baseline).
        run: |
          python3 linter-scripts/check-spec-cross-links.py \
            --root spec \
            --repo-root . \
            --github

      - name: Upload JSON report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spec-cross-links-report
          path: /tmp/spec-cross-links-report.json
          if-no-files-found: ignore

      - name: Suggest auto-fixes for broken links (advisory)
        # Companion step that runs the fuzzy-match suggester. Always exits 0
        # (advisory only — never blocks merge). Surfaces suggestions as
        # GitHub annotations so reviewers see proposed fixes inline on the
        # PR diff. Use `python3 linter-scripts/suggest-spec-cross-link-fixes.py
        # --apply` locally to rewrite files when confidence >= 0.82.
        if: always()
        run: |
          python3 linter-scripts/suggest-spec-cross-link-fixes.py \
            --root spec \
            --repo-root . \
            --github \
            --json > /tmp/spec-cross-links-suggestions.json || true
          echo "--- Human-readable summary ---"
          python3 linter-scripts/suggest-spec-cross-link-fixes.py \
            --root spec \
            --repo-root . || true

      - name: Upload suggestions JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-cross-links-suggestions
          path: /tmp/spec-cross-links-suggestions.json
          if-no-files-found: ignore

  sync-drift:
    name: Sync Drift Check (all generated files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (no scripts)
        # --ignore-scripts skips lifecycle hooks like postinstall — we only
        # need the workspace populated so the sync scripts can run. The
        # sync scripts themselves use only Node built-ins, so we don't
        # actually need any npm packages installed; this is here in case
        # future sync scripts depend on a package.
        run: npm ci --ignore-scripts --no-audit --no-fund
        continue-on-error: true

      - name: Check sync drift (all generated files)
        # Single source of truth for drift detection. The script itself
        # documents which files it watches, normalises volatile fields
        # (version.json git/updated, health-score.json generated,
        # readme UPDATED stamp), and prints the exact `npm run sync`
        # command operators must run on failure.
        #
        # Local fix workflow:
        #   npm run sync:fix      # regenerate everything in place
        #   git add -A && git commit -m "chore: sync generated files"
        run: npm run sync:check
